<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>하이큐테크 | 스마트팩토리 ERP</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%233b6ef5'/><text x='50' y='68' font-size='56' font-family='sans-serif' font-weight='bold' fill='white' text-anchor='middle'>H</text></svg>">
  <style>
    #gate { position: fixed; inset: 0; background: #f4f6fb; display: flex; align-items: center; justify-content: center; z-index: 9999; font-family: "Pretendard","Malgun Gothic",sans-serif; }
    #gate .box { background: #fff; border: 1px solid #e6eaf2; border-radius: 16px; box-shadow: 0 10px 40px rgba(20,30,60,.12); padding: 32px 30px; width: 340px; max-width: 90%; text-align: center; }
    #gate .mk { width: 52px; height: 52px; border-radius: 14px; background: linear-gradient(135deg,#3b6ef5,#6f9bff); color: #fff; font-weight: 800; font-size: 26px; display: grid; place-items: center; margin: 0 auto 14px; }
    #gate h1 { font-size: 18px; font-weight: 800; color: #1f2733; }
    #gate p { font-size: 12.5px; color: #6b7585; margin: 6px 0 18px; }
    #gate input { width: 100%; border: 1px solid #e6eaf2; border-radius: 10px; padding: 12px 14px; font-size: 15px; outline: none; text-align: center; }
    #gate input:focus { border-color: #3b6ef5; box-shadow: 0 0 0 3px #eaf0ff; }
    #gate button { width: 100%; margin-top: 12px; border: none; background: #3b6ef5; color: #fff; font-weight: 700; font-size: 15px; padding: 12px; border-radius: 10px; cursor: pointer; }
    #gate .err { color: #e23b3b; font-size: 12.5px; margin-top: 10px; min-height: 16px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="gate">
    <div class="box">
      <div class="mk">H</div>
      <h1>하이큐테크 ERP</h1>
      <p>열람 비밀번호를 입력하세요</p>
      <input id="pw" type="password" placeholder="비밀번호" autocomplete="current-password">
      <button id="go">열기</button>
      <div class="err" id="err"></div>
    </div>
  </div>

  <div class="app" style="display:none" id="appRoot">
    <header class="appbar">
      <div class="bar-top">
        <div class="brand">
          <div>
            <div class="name" id="brandName">하이큐테크<span></span></div>
            <div class="sub" id="brandSub">스마트팩토리 ERP</div>
          </div>
        </div>
        <div class="bar-right">
          <div class="date-chip" id="dateChip"></div>
        </div>
      </div>
      <nav class="tabs" id="nav"></nav>
    </header>
    <main class="content" id="content"></main>
  </div>

  <script src="enc.js"></script>
  <script>
    const b64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
    function loadScript(src) {
      return new Promise((res, rej) => { const s = document.createElement("script"); s.src = src; s.onload = res; s.onerror = rej; document.body.appendChild(s); });
    }
    async function decryptBiz(pw) {
      const E = window.ENC;
      const baseKey = await crypto.subtle.importKey("raw", new TextEncoder().encode(pw), "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey({ name: "PBKDF2", salt: b64(E.salt), iterations: E.it, hash: "SHA-256" },
        baseKey, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
      const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(E.iv) }, key, b64(E.ct));
      return new TextDecoder().decode(pt);
    }
    async function unlock() {
      const pw = document.getElementById("pw").value;
      const err = document.getElementById("err");
      err.textContent = "";
      let bizCode;
      try { bizCode = await decryptBiz(pw); }
      catch (e) { err.textContent = "비밀번호가 올바르지 않습니다."; return; }
      await loadScript("data.js");
      const s = document.createElement("script"); s.textContent = bizCode; document.body.appendChild(s);
      await loadScript("app.js");
      if (window.init) window.init();
      document.getElementById("gate").style.display = "none";
      document.getElementById("appRoot").style.display = "";
    }
    document.getElementById("go").addEventListener("click", unlock);
    document.getElementById("pw").addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });
    document.getElementById("pw").focus();
  </script>
</body>
</html>
